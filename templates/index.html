<!DOCTYPE html>
<html>

<head>
    <title>Cat vs Dog Classifier</title>

    <style>

        body{
            text-align:center;
            font-family:Arial;
            background:#111827;
            color:white;
            padding-top:50px;
        }

        .box{
            background:#1f2937;
            width:500px;
            margin:auto;
            padding:30px;
            border-radius:15px;
        }

        button{
            padding:10px 20px;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="box">

<h1>🐱🐶 Cat vs Dog Classifier</h1>

<form action="/predict" method="POST" enctype="multipart/form-data">

<input type="file" name="file" required>

<br><br>

<button type="submit">
Predict
</button>

</form>

{% if prediction %}

<h2>{{ prediction }}</h2>

<p>
Confidence: {{ confidence }}%
</p>

{% endif %}

</div>

</body>
</html>
